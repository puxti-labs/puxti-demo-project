version: 2

models:
  - name: stg_subscriptions
    description: >
      Staged subscription records from Clariva's billing system. Each row represents
      a subscription contract between Clariva and a customer account. A single account
      may have multiple subscription records over time (renewals, upgrades, churned).
    columns:
      - name: subscription_id
        description: Unique identifier for the subscription contract.
        tests:
          - unique
          - not_null
      - name: account_id
        description: Foreign key linking the subscription to a customer account.
        tests:
          - not_null
      - name: plan
        description: >
          The subscription plan tier: starter, smb, mid-market, or enterprise. Determines
          feature access and support SLA.
      - name: mrr
        description: Monthly recurring revenue for this subscription, in USD.
      - name: arr
        description: Annual recurring revenue derived from mrr × 12.
      - name: start_date
        description: Contract start date for this subscription period.
      - name: end_date
        description: Contract end date. For active subscriptions this is the renewal date.
      - name: status
        description: Current status of the subscription — active or churned.
      - name: is_active
        description: True if the subscription is currently active.
